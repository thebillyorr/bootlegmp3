<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A minimalist player for soundtracks. An experiment from the On Blank Space creative lab.">
    <meta name="theme-color" content="#f7f5f0">
    <title>Bootleg MP3 — On Blank Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <main class="layout-grid">
        <!-- LEFT COLUMN: LIBRARY INDEX -->
        <section id="library-view" class="panel library-panel">
            <header class="library-header">
                <a href="https://onblank.space" class="lab-link">↖ ON BLANK SPACE</a>
                <h1>BOOTLEG MP3</h1>
                <div class="subtitle">ARCHIVE v4.0</div>
            </header>
            <ul id="album-list">
                <!-- Javascript populates this list -->
            </ul>
        </section>

        <!-- RIGHT COLUMN: ALBUM DETAIL -->
        <section id="detail-view" class="panel detail-panel" hidden>
            <button id="mobile-back-btn" class="text-btn mobile-only">[← BACK]</button>
            <div id="album-content">
                <div class="empty-state">SELECT AN ALBUM TO VIEW CONTENTS</div>
            </div>
        </section>
    </main>

    <!-- BOTTOM BAR: PLAYER -->
    <footer id="player-bar">
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="controls-wrapper">
            <div class="track-info" id="currentSongDisplay">IDLE</div>
            
            <div class="buttons">
                <button id="shuffleButton" class="control-btn">[SHUFFLE: OFF]</button>
                <button id="playPauseButton" class="control-btn">[PLAY]</button>
                <button id="nextButton" class="control-btn">[NEXT]</button>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
